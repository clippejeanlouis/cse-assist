<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CSE Assist</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #1f4bd8;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 22px;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .card:hover {
      background: #eef2ff;
    }
  a.card {
  display: block;
  text-decoration: none;
  color: inherit;
}
  </style>
</head>

<body>

  <header>
    CSE Assist - Tableau de bord
  </header>

  <div class="container">

    <div class="card">📄 Documents entreprise</div>
    <a href="#" class="card">🔥 Plan canicule / sécurité</a>
    <div class="card">🚑 SST / premiers secours</div>
    <div class="card">📞 Annuaire téléphones</div>
    <div class="card">🚪 Procédure évacuation</div>

  </div>

</body>
</html>
